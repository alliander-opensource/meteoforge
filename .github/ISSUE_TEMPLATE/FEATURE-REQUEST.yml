name: Feature Request
description: File a request for a new feature.
title: "[Feature]: "
labels: [ "feature" ]
projects: [ "weather-provider-libraries-v3" ]
assignees:
  - rflinnenbank
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this feature request!
  - type: input
    id: contact
    attributes:
      label: Contact Details
      description: How can we get in touch with you if we need more info?
      placeholder: ex. email@example.com
    validations:
      required: false
  - type: textarea
    id: related-problem
    attributes:
      label: If your request is related to a problem, please tell us what problem?
      description: Please give a clear and concise description of what the problem as you experience it is.
      placeholder: I'm always frustrated when [...]
      value: "The problem I'm facing is..."
    validations:
      required: false
  - type: textarea
    id: desired-solution
    attributes:
      label: What new feature or solution would you like to see?
      description: Please give a clear and concise description of what you think should happen and how.
      placeholder: When I [...], I want to [...], so that [...]!
      value: "I would like to see..."
    validations:
      required: true
  - type: textarea
    id: possible-alternatives
    attributes:
      label: Have you considered alternative solutions or feature workings?
      description: Please give a clear and concise description of these alternatives and why you did not choose these.
      placeholder: I thought about [...], but [...]!
      value: "I considered..."
    validations:
      required: false
  - type: textarea
    id: additional-info
    attributes:
      label: Is there anything else you want to include in this request?
      description: Are there any related ideas, example implementations or variants to the feature you wish to mention as an aside?
      placeholder: This is a great idea because [...]! This could also be [...].
      value: "I also want to mention..."
    validations:
      required: false
  - type: dropdown
    id: version
    attributes:
      label: Version
      description: What version of our software are you running?
      options:
        - 3.0.xx (Current)
        - 3.1.xx (Beta)
      default: 0
    validations:
      required: true
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of Conduct](https://github.com/alliander-opensource/weather-provider-libraries/blob/main/CODE_OF_CONDUCT.rst).
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
